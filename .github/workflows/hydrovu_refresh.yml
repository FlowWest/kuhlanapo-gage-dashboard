name: HydroVu Daily Refresh

on:
  schedule:
    # 7:XXam Pacific = 14:XX UTC (standard), 15:XX UTC (DST)
    # Run twice; script enforces PT time window
    - cron: "10 14 * * *"
    - cron: "10 15 * * *"
  workflow_dispatch:

concurrency:
  group: data-pull-lock
  cancel-in-progress: false
  
jobs:
  refresh:
    runs-on: ubuntu-latest
    environment: hydrovu

    steps:
      - name: Check schedule against time zone
        id: ptcheck
        if: github.event_name == 'schedule'
        run: |
          PT_HOUR=$(TZ=America/Los_Angeles date +'%H')

          if [ "$PT_HOUR" = "07" ]; then
            echo "run_job=true" >> $GITHUB_OUTPUT
          else
            echo "run_job=false" >> $GITHUB_OUTPUT
          fi

      - name: Skip if not correct scheduled time
        if: github.event_name == 'schedule' && steps.ptcheck.outputs.run_job != 'true'
        run: |
          echo "Not at the schedule time in PT. Skipping scheduled run."
          exit 0

      - name: Checkout data branch
        uses: actions/checkout@v4
        with:
          ref: data
          persist-credentials: true

      - name: Set up R
        uses: r-lib/actions/setup-r@v2

      - name: Install system deps
        run: sudo apt-get install -y libcurl4-openssl-dev

      - name: Install R packages
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: |
            httr
            jsonlite
            dplyr
            lubridate
            tidyr
            purrr
            tibble
            forcats
            stringr

      - name: Fetch HydroVu data
        env:
          HYDROVU_CLIENT_ID: ${{ secrets.HYDROVU_CLIENT_ID }}
          HYDROVU_CLIENT_SECRET: ${{ secrets.HYDROVU_CLIENT_SECRET }}
        run: |
          Rscript scripts/fetch_hydrovu.R

      - name: Commit updated data
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add data/gage_data.rds
          git commit -m "Daily HydroVu refresh" || echo "No changes"

          for i in 1 2 3 4 5; do
            git push origin HEAD:data && break
            echo "Push rejected (attempt $i/5) - rebasing onto latest data branch and retrying"
            git fetch origin data
            git rebase origin/data
          done
